<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farewell Entry Verification</title>
    <script type="module" crossorigin src="./assets/index-CLAwqaPt.js"></script>
  </head>
  <body>
    <div id="root">
      <style>
        .initial-loader {
          position: fixed;
          top: 0; left: 0; width: 100%; height: 100%;
          background: #04030a;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          z-index: 9999;
          font-family: 'DM Sans', system-ui, sans-serif;
        }
        .loader-circle {
          width: 80px;
          height: 80px;
          border: 2px solid rgba(244, 196, 48, 0.03);
          border-top: 2px solid #f4c430;
          border-radius: 50%;
          animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        .loader-text {
          margin-top: 32px;
          color: #f4c430;
          letter-spacing: 0.5em;
          font-size: 11px;
          font-weight: 800;
          text-transform: uppercase;
          animation: pulse 2s ease-in-out infinite;
          opacity: 0.8;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.4; filter: blur(2px); } 50% { opacity: 1; filter: blur(0px); } }
      </style>
      <div class="initial-loader">
        <div class="loader-circle"></div>
        <div class="loader-text">Securing Link</div>
      </div>
    </div>
  </body>
